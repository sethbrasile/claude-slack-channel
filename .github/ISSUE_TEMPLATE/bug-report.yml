name: Bug Report
description: Report a bug with claude-slack-channel
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: bun_version
    attributes:
      label: Bun version
      placeholder: "1.2.x"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (stderr)
      description: "IMPORTANT: Remove or redact any Slack tokens (xoxb-, xapp-) before pasting"
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: token_check
    attributes:
      label: Token redaction confirmation
      options:
        - label: "I have confirmed no xoxb-, xoxp-, or xapp- tokens appear in this report"
          required: true
