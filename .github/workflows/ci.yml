name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2       # v4.2.2
      - uses: oven-sh/setup-bun@v2.0.3      # v2.0.3
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bunx biome check .
      - run: bun test --coverage
      - run: bun audit
