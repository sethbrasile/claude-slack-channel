# Slack App Manifest for claude-slack-channel
#
# Paste this manifest at https://api.slack.com/apps > "Create New App" > "From a manifest"
# to create a preconfigured Slack app in seconds.
#
# NOTE: The app-level token (xapp-) requires the "connections:write" scope.
# This scope is set separately when you generate the app-level token:
#   Basic Information > App-Level Tokens > Generate Token and Scopes > Add "connections:write"
# The "connections:write" scope is NOT part of this manifest.

_metadata:
  major_version: 2
  minor_version: 1

display_information:
  name: Claude Slack Channel
  description: MCP bridge for Claude Code automation pipelines
  background_color: "#1A1D21"

features:
  bot_user:
    display_name: Claude
    always_online: true

oauth_config:
  scopes:
    bot:
      # NOTE: DM channels (im: scope) are NOT supported by this server.
      # SLACK_CHANNEL_ID must be a public channel (C...) or private channel (C...).
      # Configuring a DM channel ID will result in silent message loss.
      - chat:write        # post messages as the bot
      # NOTE: channels:history and groups:history grant workspace-wide read access to
      # message events in any channel the bot joins — not scoped to SLACK_CHANNEL_ID alone.
      # The server filters by SLACK_CHANNEL_ID in code. Review before granting to
      # shared workspaces with sensitive channels.
      - channels:history  # receive message events from public channels
      - groups:history    # receive message events from private channels

settings:
  event_subscriptions:
    bot_events:
      - message.channels  # public channel messages
      - message.groups    # private channel messages
  interactivity:
    is_enabled: true      # required for Approve/Deny buttons; also required for Socket Mode
                          # to receive interactive payload events (button clicks)
  socket_mode_enabled: true
  is_hosted: false
  token_rotation_enabled: false
